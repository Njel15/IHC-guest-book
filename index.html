<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IHC & Maldives Guest Book Event 2026</title>
    <link href="https://fonts.cdnfonts.com/css/glacial-indifference" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-blue-full: #5876D6; 
            --apple-blue: #007AFF;
        }

        body {
            font-family: 'Glacial Indifference', sans-serif;
            background-color: #f5f5f7;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 90%; max-width: 420px;
            background-color: var(--bg-blue-full);
            border-radius: 40px; padding: 40px 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center; color: white;
            box-sizing: border-box;
        }

        .logo-header { 
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-bottom: 30px; 
        }
        
        .logo-box { 
            width: 200px; height: 160px;
            display: flex; justify-content: center; align-items: center;
        }

        .logo-box img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; display: block;
        }

        h2 { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 26px; }

        /* FORM ALIGNMENT FIX (PAKAI GRID) */
        .field-container { 
            display: grid; 
            grid-template-columns: 90px 1fr; /* Kolom kiri tetap 90px, kanan fleksibel */
            align-items: center; 
            row-gap: 20px; /* Jarak antar baris */
            text-align: left;
        }

        label.input-label { 
            font-size: 13px; 
            font-weight: 800; 
            text-transform: uppercase; 
            color: white;
            padding-right: 10px;
        }
        
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 15px 20px; border: none; border-radius: 18px;
            font-size: 16px; font-family: 'Glacial Indifference', sans-serif;
            box-sizing: border-box; color: #1d1d1f; background: #fff;
            -webkit-appearance: none;
        }

        /* Khusus baris Whatsapp agar tombol dan input sejajar */
        .wa-row-content {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .btn-verify {
            background: white; color: var(--apple-blue); border: none;
            padding: 0 15px; border-radius: 15px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 11px; height: 50px;
            flex-shrink: 0; /* Mencegah tombol menciut */
            -webkit-tap-highlight-color: transparent;
        }

        .btn-action {
            grid-column: span 2; /* Tombol ambil seluruh lebar grid */
            width: 100%; padding: 18px; background: #000; color: white;
            border: none; border-radius: 18px; font-size: 16px; font-weight: 700;
            text-transform: uppercase; cursor: pointer; margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-action:disabled { background: #8ba2e7 !important; color: #fff !important; opacity: 0.7; }

        .agreement-container {
            grid-column: span 2;
            display: flex; align-items: center; justify-content: center;
            padding: 15px 0; gap: 12px; cursor: pointer;
        }

        .agreement-container input { width: 22px; height: 22px; cursor: pointer; }
        .agreement-container span { font-weight: 700; font-size: 13px; }
        
        .gift-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .gift-box {
            font-size: 35px; cursor: pointer; background: rgba(255,255,255,0.2);
            width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
            border-radius: 20px; border: 2px dashed rgba(255,255,255,0.4);
        }

        .shuffle { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }

        .hidden { display: none !important; }
        #result-text { font-size: 22px; font-weight: 800; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-header">
        <div class="logo-box">
            <img src="https://i.imgur.com/dwvPj8p.png" alt="Logo IHC">
        </div>
        <div class="logo-box">
            <img src="https://i.imgur.com/2YLVNZR.png" alt="Logo Maldives">
        </div>
    </div>

    <div id="step-1">
        <h2>Guest Book</h2>
        <div class="field-container">
            <label class="input-label">Nama</label>
            <input type="text" id="nama" placeholder="Full Name" autocomplete="off">

            <label class="input-label">Instagram</label>
            <input type="text" id="ig" placeholder="@username" autocomplete="off">

            <label class="input-label">Whatsapp</label>
            <div class="wa-row-content">
                <input type="tel" id="hp" placeholder="081xxx" autocomplete="off">
                <button class="btn-verify" onclick="submitStep1()">Verifikasi</button>
            </div>
        </div>
    </div>

    <div id="step-2" class="hidden">
        <h2>Follow Us</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-action" style="grid-column: auto;" onclick="window.open('https://instagram.com/indo_collections', '_blank')">Follow @indo_collections</button>
            <button class="btn-action" style="grid-column: auto; background:#333" onclick="window.open('https://instagram.com/maldives.legend', '_blank')">Follow @maldives.legend</button>
            
            <div class="agreement-container" onclick="toggleCheckbox()">
                <input type="checkbox" id="check-follow" onclick="event.stopPropagation(); validateFollow()">
                <span>SAYA SUDAH FOLLOW KEDUANYA</span>
            </div>

            <button class="btn-action" id="btn-lanjut" style="grid-column: auto; background:#fff; color:var(--apple-blue)" onclick="showGifts()" disabled>LANJUT AMBIL KADO</button>
        </div>
    </div>

    <div id="step-3" class="hidden">
        <h2>Lucky Draw</h2>
        <div class="gift-container">
            <div class="gift-box" onclick="pickGift(0)">🎁</div>
            <div class="gift-box" onclick="pickGift(1)">🎁</div>
            <div class="gift-box" onclick="pickGift(2)">🎁</div>
        </div>
        <div id="result-text"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwUg_yLBBeqf0a9b0YTxKxZW4KFAr51OjCUz4XVXelN4yvd4iWwePwypb6VYZEFG-7S/exec';
    const WA_NUMBER = '628132002039';
    let isPicked = false;

    function submitStep1() {
        const n = document.getElementById('nama').value;
        const i = document.getElementById('ig').value;
        const h = document.getElementById('hp').value;
        if(!n || !h) return alert("Isi data dulu!");

        const waText = `Halo IHC, saya ${n} (IG: ${i}) sudah isi buku tamu.`;
        const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waText)}`;

        const newWindow = window.open(waLink, '_blank');
        if (!newWindow || newWindow.closed || typeof newWindow.closed == 'undefined') {
            window.location.href = waLink;
        }

        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({nama: n, instagram: i, nohp: h}) });

        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function toggleCheckbox() {
        const cb = document.getElementById('check-follow');
        cb.checked = !cb.checked;
        validateFollow();
    }

    function validateFollow() {
        const cb = document.getElementById('check-follow');
        const btn = document.getElementById('btn-lanjut');
        btn.disabled = !cb.checked;
    }

    function showGifts() {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        const boxes = document.querySelectorAll('.gift-box');
        boxes.forEach(box => box.classList.add('shuffle'));
        setTimeout(() => { boxes.forEach(box => box.classList.remove('shuffle')); }, 1500);
    }

    function pickGift(idx) {
        if(isPicked) return;
        isPicked = true;
        const boxes = document.querySelectorAll('.gift-box');
        let r = Math.random() * 100;
        let hadiah = r < 20 ? "MUG" : (r < 30 ? "KEYCHAIN" : "KIPAS");

    boxes[idx].innerHTML = `<span style="font-size:14px; color:#000; font-weight:bold;">${hadiah}</span>`;
    boxes[idx].style.background = "#fff";

    // 2. Ganti logika sisaHadiah agar tidak ada hadiah kembar
    let semuaOpsi = ["MUG", "KEYCHAIN", "KIPAS"];
    let sisaHadiah = semuaOpsi.filter(item => item !== hadiah); // Membuang hadiah yang sudah didapat
    
    // Acak posisi sisa hadiah biar seru
    sisaHadiah.sort(() => Math.random() - 0.5);

    let counter = 0;
    boxes.forEach((b, i) => {
        if (i !== idx) {
            b.style.opacity = "0.4";
            
            let hadiahFake = sisaHadiah[counter];
            counter++;

            b.innerHTML = `<span style="font-size:11px; color:#fff; font-weight:normal; opacity:0.8;">${hadiahFake}</span>`;
            b.style.background = "rgba(255,255,255,0.1)";
        }
    });
        
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        document.getElementById('result-text').innerText = "SELAMAT! DAPAT: " + hadiah;

        fetch(SCRIPT_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new URLSearchParams({instagram: document.getElementById('ig').value, hadiah: hadiah}) 
        });
    }
</script>
</body>
</html>
